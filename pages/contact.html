<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact us for any inquiries or collaborations. We are here to help you with your digital design and development needs.">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/contact.css">
    <title>Contact Us</title>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="../index.html"><img class="logo" src="../assets/logos/circle.svg" alt="Circle"></a>
      <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="main-menu">
        <span class="menu-toggle-line"></span>
        <span class="menu-toggle-line"></span>
        <span class="menu-toggle-line"></span>
      </button>
      <div class="header-menu" id="main-menu">
        <nav class="nav-links">
          <a href="../index.html">Home</a>
          <a href="../index.html#projects">Projects</a>
          <a href="../index.html#services">Services</a>
        </nav>
        <a class="btn btn-secondary" href="#contact">Contact Us</a>
      </div>
    </div>
  </header>
    

  <!-- Contact Form -->
  <section id="contact" class="contact-section">
    <h1>Contact Us</h1>
    <form class="contact-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email address" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
        </div>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </section>

  <footer class="site-footer">
    <div class="container footer-inner">
      <a href="../index.html"><img class="logo" src="../assets/logos/circle.svg" alt="Circle"></a>
      <nav>
        <a href="#">Team</a>
        <a href="#services">Services</a>
        <a href="#">About Us</a>
        <a href="#">Press</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Privacy Policy</a>
      </nav>
      <p>2972 Westheimer Rd. Santa Ana,<br>Illinois 85486</p>
    </div>
  </footer>
  <button id="scroll-top-btn" class="scroll-top-btn" type="button" aria-label="Back to top">↑</button>
  <script src="../js/header-scroll.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/scroll-top.js"></script>
  <script src="../js/contact.js"></script>
</body>
</html>
