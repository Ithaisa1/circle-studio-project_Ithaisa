<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact us for any inquiries or collaborations. We are here to help you with your digital design and development needs.">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/contact.css">
    <link rel="shortcut icon" href="/assets/logos/favicon.ico" type="image/x-icon">
    <title>Contact Us</title>
</head>
<body>
  <!-- Header -->
  <div id="header-component"></div>

  <!-- Contact Form -->
  <section id="contact" class="contact-section">
    <h1>Contact Us</h1>
    <form class="contact-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email address" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
        </div>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </section>

  <!-- Footer -->
  <div id="footer-component"></div>

  <!-- Scroll to top -->
  <button id="scroll-top-btn" class="scroll-top-btn" type="button" aria-label="Back to top">&uarr;</button>

  <!-- Scripts -->
  <script src="../js/components.js"></script>
  <script src="../js/header.js"></script>
  <script src="../js/scroll-top.js"></script>
  <script src="../js/contact.js"></script>
  <script src="../js/cursor-trail.js"></script>
</body>
</html>
